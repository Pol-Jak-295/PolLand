background {
    monitor =
    path = ~/.config/images/frieren.png   # or leave empty for solid color
    blur_passes = 0
    blur_size = 0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(137, 180, 250)
    inner_color = rgb(17, 17, 27)
    font_color = rgb(137, 220, 235)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M") </big></b>"
    color = rgb(17, 17, 27)
    font_size = 64
    font_family = NotoSansM Nerd Font Mono
    position = 0, 300
    halign = center
    valign = center
}